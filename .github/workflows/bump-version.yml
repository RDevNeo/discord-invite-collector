name: Bump userscript version

# Auto-increments the patch version on every push to main that changes the
# userscript, so Tampermonkey detects a new version and pulls the update.
# The bump commit is pushed with GITHUB_TOKEN, which does NOT re-trigger
# workflows, so there is no loop. The [skip-bump] marker is a belt-and-braces
# guard in case the push token is ever changed to a PAT.

on:
  push:
    branches: [main]
    paths:
      - "discord-invite-collector.user.js"

permissions:
  contents: write

concurrency:
  group: bump-version
  cancel-in-progress: false

jobs:
  bump:
    if: ${{ !contains(github.event.head_commit.message, '[skip-bump]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Bump patch version
        id: bump
        run: |
          set -euo pipefail
          FILE="discord-invite-collector.user.js"
          current="$(grep -oE '^// @version[[:space:]]+[0-9]+\.[0-9]+\.[0-9]+' "$FILE" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$current"
          new="${MAJOR}.${MINOR}.$((PATCH + 1))"
          echo "Bumping $current -> $new"
          sed -i -E "s|^(// @version[[:space:]]+).*|\1${new}|" "$FILE"
          sed -i -E "s|(const SCRIPT_VERSION = \")[0-9]+\.[0-9]+\.[0-9]+(\";)|\1${new}\2|" "$FILE"
          echo "new=${new}" >> "$GITHUB_OUTPUT"

      - name: Commit and push
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "Nothing to bump."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add discord-invite-collector.user.js
          git commit -m "chore: bump userscript version to ${{ steps.bump.outputs.new }} [skip-bump]"
          git push
